<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>memento — osteological survey</title>
<style>
  :root{
    --soot:#0b0b0e;
    --smoke:#232328;
    --steel:#7d828c;
    --ash:#9a9aa2;
    --paper:#d8d6d0;
    --violet:#9d7bff;
    --violet-dim:#6f57c9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--soot);overflow:hidden;}
  body{
    font-family:ui-monospace,"Cascadia Mono","JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
    color:var(--ash);
  }
  canvas#field{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair;}

  .eyebrow{
    position:fixed;top:1.4rem;left:1.6rem;
    font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;
    color:var(--steel);user-select:none;pointer-events:none;
  }
  .eyebrow b{color:var(--paper);font-weight:400;}

  .plate{
    position:fixed;left:1.6rem;bottom:1.4rem;
    font-size:.68rem;letter-spacing:.18em;
    color:var(--steel);user-select:none;
    display:flex;flex-direction:column;gap:.45rem;
  }
  .plate .no{color:var(--paper);}
  .plate .redact{
    display:inline-block;width:2.6em;height:.72em;
    background:var(--smoke);vertical-align:baseline;
    transform:translateY(.05em);margin-right:.15em;
  }
  .plate .caption{
    font-size:.6rem;letter-spacing:.14em;color:#55555e;
    font-style:italic;
  }

  .controls{position:fixed;right:1.6rem;bottom:1.4rem;}
  button.resurvey{
    background:transparent;
    border:1px solid var(--smoke);
    color:var(--ash);
    font:inherit;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;
    padding:.7em 1.3em .7em 1.6em;
    cursor:pointer;
    transition:color .35s,border-color .35s,text-shadow .35s;
  }
  button.resurvey:hover{
    color:var(--violet);
    border-color:var(--violet-dim);
    text-shadow:0 0 10px rgba(157,123,255,.55);
  }
  button.resurvey:focus-visible{
    outline:1px solid var(--violet);
    outline-offset:3px;
  }

  @media (max-width:600px){
    .eyebrow{left:1rem;top:1rem;}
    .plate{left:1rem;bottom:1rem;}
    .controls{right:1rem;bottom:1rem;}
  }
</style>
</head>
<body>

<canvas id="field" role="img" aria-label="A human skull formed from drifting ash particles. Its jaw slowly opens and closes, and faint violet embers burn in the eye sockets."></canvas>

<div class="eyebrow">Cold Iron Registry · <b>Osteological Survey</b></div>

<div class="plate" id="plate">
  <span class="no">PLATE <span class="redact" aria-hidden="true"></span><span id="plateNo">—</span></span>
  <span>SEED <span id="seedNo">—</span></span>
  <span class="caption">specimen animate · touch to disturb</span>
</div>

<div class="controls">
  <button class="resurvey" id="resurvey" type="button">Re-survey</button>
</div>

<script>
(() => {
  "use strict";

  /* ---------- seeded randomness ---------- */
  function mulberry32(a){
    return function(){
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  /* ---------- skull geometry: draw once offscreen, sample to points ---------- */
  const S = 300; // sampling resolution

  function samplePoints(draw){
    const off = document.createElement("canvas");
    off.width = S; off.height = S;
    const o = off.getContext("2d", { willReadFrequently: true });
    draw(o);
    const data = o.getImageData(0, 0, S, S).data;
    const pts = [];
    for (let y = 0; y < S; y += 2){
      for (let x = 0; x < S; x += 2){
        if (data[(y * S + x) * 4 + 3] > 90){
          // normalized, centered: -1..1
          pts.push([ (x - 150) / 150, (y - 150) / 150 ]);
        }
      }
    }
    return pts;
  }

  function drawCranium(o){
    o.fillStyle = "#fff";
    // dome
    o.beginPath();
    o.ellipse(150, 115, 97, 102, 0, 0, Math.PI * 2);
    o.fill();
    // cheeks / upper face
    o.beginPath();
    o.moveTo(62, 130);
    o.quadraticCurveTo(64, 190, 98, 214);
    o.lineTo(202, 214);
    o.quadraticCurveTo(236, 190, 238, 130);
    o.closePath();
    o.fill();
    // voids
    o.globalCompositeOperation = "destination-out";
    o.beginPath(); o.ellipse(112, 152, 25, 19, -0.22, 0, Math.PI * 2); o.fill();
    o.beginPath(); o.ellipse(188, 152, 25, 19,  0.22, 0, Math.PI * 2); o.fill();
    o.beginPath();
    o.moveTo(150, 162);
    o.lineTo(136, 198);
    o.quadraticCurveTo(150, 208, 164, 198);
    o.closePath();
    o.fill();
    o.globalCompositeOperation = "source-over";
    // upper teeth
    for (let i = 0; i < 6; i++){
      const h = 26 - Math.abs(i - 2.5) * 2;
      o.fillRect(113 + i * 13, 212, 10, h);
    }
  }

  function drawMandible(o){
    o.fillStyle = "#fff";
    o.strokeStyle = "#fff";
    // lower teeth
    for (let i = 0; i < 6; i++){
      const h = 20 - Math.abs(i - 2.5) * 1.6;
      o.fillRect(116 + i * 12, 244, 9, h);
    }
    // jaw bone
    o.lineCap = "round";
    o.lineWidth = 20;
    o.beginPath();
    o.moveTo(88, 232);
    o.quadraticCurveTo(150, 298, 212, 232);
    o.stroke();
    // rami
    o.lineWidth = 14;
    o.beginPath(); o.moveTo(88, 234);  o.lineTo(80, 206);  o.stroke();
    o.beginPath(); o.moveTo(212, 234); o.lineTo(220, 206); o.stroke();
  }

  /* ---------- canvas ---------- */
  const canvas = document.getElementById("field");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0, DPR = 1, SCALE = 200, CX = 0, CY = 0;

  function sizeCanvas(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    SCALE = Math.min(W, H) * 0.36;
    CX = W / 2;
    CY = H * 0.46;
  }

  /* ---------- palette ---------- */
  const SOOT = "rgba(11,11,14,";
  const BONE_SHADES = [
    [206,204,198],  // paper
    [190,188,184],
    [168,168,174],  // pale ash
    [134,136,144],  // steel (shadow grain)
  ];
  const VIOLET_CORE = [200,172,255];
  const VIOLET_HALO = [120, 88,210];

  /* ---------- state ---------- */
  let seed, rand, particles, orbiters, startTime, raf = null;
  const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const pointer = { x: -9999, y: -9999, force: 0 };

  const SOCKETS = [
    { x: -0.253, y: 0.013, r: 0.16 },
    { x:  0.253, y: 0.013, r: 0.16 },
  ];

  let upperPts = null, jawPts = null;

  function particleCount(){
    return Math.min(2400, Math.max(800, Math.round((W * H) / 620)));
  }

  function buildParticles(){
    if (!upperPts){
      upperPts = samplePoints(drawCranium);
      jawPts   = samplePoints(drawMandible);
    }
    const N = particleCount();
    const total = upperPts.length + jawPts.length;
    const pick = (pool, n) => {
      const idx = pool.map((_, i) => i);
      for (let i = idx.length - 1; i > 0; i--){
        const j = Math.floor(rand() * (i + 1));
        [idx[i], idx[j]] = [idx[j], idx[i]];
      }
      return idx.slice(0, n).map(i => pool[i]);
    };
    const homesU = pick(upperPts, Math.round(N * upperPts.length / total));
    const homesJ = pick(jawPts,   Math.round(N * jawPts.length / total));

    const make = ([hx, hy], jaw) => {
      const shade = BONE_SHADES[Math.floor(rand() * BONE_SHADES.length)];
      return {
        hx, hy, jaw,
        x: rand() * W, y: rand() * H,        // born scattered — the skull closes itself
        vx: 0, vy: 0,
        size: 1 + rand() * 1.6,
        shade,
        alpha: 0.5 + rand() * 0.5,
        jp: rand() * Math.PI * 2,            // jitter phase
        js: 0.5 + rand(),                    // jitter speed
        ember: 0, emberMax: 0,
      };
    };
    particles = [
      ...homesU.map(h => make(h, false)),
      ...homesJ.map(h => make(h, true)),
    ];

    // socket embers
    orbiters = [];
    for (const s of SOCKETS){
      for (let i = 0; i < 13; i++){
        orbiters.push({
          s,
          a: rand() * Math.PI * 2,
          rf: 0.25 + rand() * 0.65,
          sp: (0.004 + rand() * 0.01) * (rand() < 0.5 ? 1 : -1),
          size: 0.8 + rand() * 1.2,
          fp: rand() * Math.PI * 2,
        });
      }
    }
  }

  /* ---------- jaw cycle: pause · open · hold · close ---------- */
  const PERIOD = 7;
  function smoothstep(e0, e1, x){
    const t = Math.min(1, Math.max(0, (x - e0) / (e1 - e0)));
    return t * t * (3 - 2 * t);
  }
  function jawOpen(now){
    const p = ((now - startTime) / 1000) % PERIOD;
    if (p < 2.2) return 0;
    if (p < 3.4) return smoothstep(2.2, 3.4, p);
    if (p < 4.0) return 1;
    if (p < 5.2) return 1 - smoothstep(4.0, 5.2, p);
    return 0;
  }

  /* ---------- simulation ---------- */
  function step(now){
    ctx.fillStyle = SOOT + "0.3)";
    ctx.fillRect(0, 0, W, H);

    const open = REDUCED ? 0 : jawOpen(now);
    const time = now / 1000;

    // socket glow, breathing with the jaw
    const glow = 0.07 + 0.05 * Math.sin(time * 0.9) + open * 0.09;
    for (const s of SOCKETS){
      const gx = CX + s.x * SCALE, gy = CY + s.y * SCALE, gr = s.r * SCALE;
      const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr);
      g.addColorStop(0, `rgba(${VIOLET_HALO[0]},${VIOLET_HALO[1]},${VIOLET_HALO[2]},${glow})`);
      g.addColorStop(1, "rgba(120,88,210,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(gx, gy, gr, 0, Math.PI * 2); ctx.fill();
    }

    for (const p of particles){
      // animated home
      let hx = p.hx, hy = p.hy;
      if (p.jaw){
        const w = 1 - Math.min(1, Math.abs(p.hx) / 0.6);   // chin drops most
        hy = p.hy + open * (0.10 + 0.11 * w);
        hx = p.hx * (1 + open * 0.015);
      }
      let tx = CX + hx * SCALE;
      let ty = CY + hy * SCALE;
      // breath of jitter so the bone never sits dead still
      tx += Math.sin(time * p.js + p.jp) * 1.4;
      ty += Math.cos(time * p.js * 0.9 + p.jp) * 1.4;

      if (p.ember > 0){
        // shed ember: stop obeying the skull, rise and burn out
        p.vy -= 0.03;
        p.vx += (rand() - 0.5) * 0.12;
        p.x += p.vx; p.y += p.vy;
        const k = p.ember / p.emberMax;
        const heat = k * k;
        const r = Math.round(VIOLET_CORE[0] * heat + p.shade[0] * (1 - heat));
        const g = Math.round(VIOLET_CORE[1] * heat + p.shade[1] * (1 - heat));
        const b = Math.round(VIOLET_CORE[2] * heat + p.shade[2] * (1 - heat));
        ctx.fillStyle = `rgba(${VIOLET_HALO[0]},${VIOLET_HALO[1]},${VIOLET_HALO[2]},${0.12 * heat})`;
        ctx.fillRect(p.x - p.size * 2, p.y - p.size * 2, p.size * 4, p.size * 4);
        ctx.fillStyle = `rgba(${r},${g},${b},${0.25 + 0.6 * heat})`;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        if (--p.ember === 0){ p.x = tx; p.y = ty; p.vx = 0; p.vy = 0; }
        continue;
      }

      // spring home
      p.vx += (tx - p.x) * 0.022;
      p.vy += (ty - p.y) * 0.022;

      // pointer disturbance
      const dx = p.x - pointer.x, dy = p.y - pointer.y;
      const d2 = dx * dx + dy * dy;
      const R = 80 + pointer.force * 60;
      if (d2 < R * R && d2 > 0.01){
        const d = Math.sqrt(d2);
        const f = ((R - d) / R) * (0.9 + pointer.force * 1.6);
        p.vx += (dx / d) * f;
        p.vy += (dy / d) * f;
      }

      p.vx *= 0.86; p.vy *= 0.86;
      p.x += p.vx; p.y += p.vy;

      ctx.fillStyle = `rgba(${p.shade[0]},${p.shade[1]},${p.shade[2]},${p.alpha})`;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }

    // the skull sheds an ember now and then
    if (!REDUCED && rand() < 0.02){
      const p = particles[Math.floor(rand() * particles.length)];
      if (p.ember === 0){ p.ember = p.emberMax = 100 + Math.floor(rand() * 120); }
    }

    // socket orbiters
    for (const e of orbiters){
      e.a += e.sp;
      const s = e.s;
      const ex = CX + (s.x + Math.cos(e.a) * s.r * e.rf) * SCALE;
      const ey = CY + (s.y + Math.sin(e.a) * s.r * e.rf * 0.7) * SCALE;
      const fl = 0.35 + 0.3 * Math.sin(time * 2.3 + e.fp) + open * 0.3;
      ctx.fillStyle = `rgba(${VIOLET_CORE[0]},${VIOLET_CORE[1]},${VIOLET_CORE[2]},${Math.max(0, Math.min(1, fl))})`;
      ctx.fillRect(ex - e.size / 2, ey - e.size / 2, e.size, e.size);
    }

    pointer.force *= 0.94;
  }

  function loop(now){
    step(now);
    raf = requestAnimationFrame(loop);
  }

  /* ---------- survey lifecycle ---------- */
  function seedFromHash(){
    const m = location.hash.match(/seed=(0x[0-9a-fA-F]{1,8})/);
    if (m) return (parseInt(m[1], 16) >>> 0) || 1;
    return null;
  }
  function randomSeed(){
    return (Math.floor(Math.random() * 0xFFFFFFFF) >>> 0) || 1;
  }
  function hex(n, width){
    return "0x" + n.toString(16).toUpperCase().padStart(width, "0");
  }
  function stampPlate(){
    document.getElementById("plateNo").textContent =
      "-" + ((seed >>> 16) & 0xFFFF).toString(16).toUpperCase().padStart(4, "0");
    document.getElementById("seedNo").textContent = hex(seed, 8);
  }

  function survey(newSeed){
    if (raf !== null){ cancelAnimationFrame(raf); raf = null; }
    seed = newSeed;
    rand = mulberry32(seed);
    startTime = performance.now();

    sizeCanvas();
    ctx.fillStyle = SOOT + "1)";
    ctx.fillRect(0, 0, W, H);

    buildParticles();
    stampPlate();
    history.replaceState(null, "", "#seed=" + hex(seed, 8));

    if (REDUCED){
      // settle the specimen, then hold still
      for (const p of particles){ p.x = CX + p.hx * SCALE; p.y = CY + p.hy * SCALE; }
      step(performance.now());
    } else {
      raf = requestAnimationFrame(loop);
    }
  }

  /* ---------- interaction ---------- */
  document.getElementById("resurvey").addEventListener("click", () => survey(randomSeed()));

  canvas.addEventListener("pointermove", (e) => {
    pointer.x = e.clientX; pointer.y = e.clientY;
  });
  canvas.addEventListener("pointerdown", (e) => {
    pointer.x = e.clientX; pointer.y = e.clientY;
    pointer.force = 1;
    if (REDUCED){
      for (let i = 0; i < 60; i++) step(performance.now() + i * 16);
    }
  });
  canvas.addEventListener("pointerleave", () => {
    pointer.x = -9999; pointer.y = -9999;
  });

  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => survey(seed), 180);
  });

  /* ---------- begin ---------- */
  survey(seedFromHash() ?? randomSeed());
})();
</script>
</body>
</html>
