<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>drift — atmospheric survey</title>
<style>
  :root{
    --soot:#0b0b0e;
    --smoke:#232328;
    --steel:#7d828c;
    --ash:#9a9aa2;
    --paper:#d8d6d0;
    --violet:#9d7bff;
    --violet-dim:#6f57c9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--soot);overflow:hidden;}
  body{
    font-family:ui-monospace,"Cascadia Mono","JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
    color:var(--ash);
  }
  canvas#field{position:fixed;inset:0;width:100%;height:100%;display:block;}

  .eyebrow{
    position:fixed;top:1.4rem;left:1.6rem;
    font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;
    color:var(--steel);user-select:none;pointer-events:none;
  }
  .eyebrow b{color:var(--paper);font-weight:400;}

  .plate{
    position:fixed;left:1.6rem;bottom:1.4rem;
    font-size:.68rem;letter-spacing:.18em;
    color:var(--steel);user-select:none;
    display:flex;flex-direction:column;gap:.45rem;
  }
  .plate .no{color:var(--paper);}
  .plate .seed{color:var(--steel);}
  .plate .redact{
    display:inline-block;width:2.6em;height:.72em;
    background:var(--smoke);vertical-align:baseline;
    transform:translateY(.05em);margin-right:.15em;
  }
  .plate .caption{
    font-size:.6rem;letter-spacing:.14em;color:#55555e;
    font-style:italic;
  }

  .controls{position:fixed;right:1.6rem;bottom:1.4rem;}
  button.resurvey{
    background:transparent;
    border:1px solid var(--smoke);
    color:var(--ash);
    font:inherit;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;
    padding:.7em 1.3em .7em 1.6em;
    cursor:pointer;
    transition:color .35s,border-color .35s,text-shadow .35s;
  }
  button.resurvey:hover{
    color:var(--violet);
    border-color:var(--violet-dim);
    text-shadow:0 0 10px rgba(157,123,255,.55);
  }
  button.resurvey:focus-visible{
    outline:1px solid var(--violet);
    outline-offset:3px;
  }

  @media (max-width:600px){
    .eyebrow{left:1rem;top:1rem;}
    .plate{left:1rem;bottom:1rem;}
    .controls{right:1rem;bottom:1rem;}
  }
</style>
</head>
<body>

<canvas id="field" role="img" aria-label="Generative drift of ash particles riding a slow wind field, with occasional violet embers."></canvas>

<div class="eyebrow">Cold Iron Registry · <b>Atmospheric Survey</b></div>

<div class="plate" id="plate">
  <span class="no">PLATE <span class="redact" aria-hidden="true"></span><span id="plateNo">—</span></span>
  <span class="seed">SEED <span id="seedNo">—</span></span>
  <span class="caption">particulate drift · sector unspecified · touch to ignite</span>
</div>

<div class="controls">
  <button class="resurvey" id="resurvey" type="button">Re-survey</button>
</div>

<script>
(() => {
  "use strict";

  /* ---------- seeded randomness ---------- */
  function mulberry32(a){
    return function(){
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  /* ---------- classic Perlin 3D, permutation shuffled by seed ---------- */
  function makeNoise(rand){
    const perm = new Uint8Array(512);
    const src = Array.from({length:256}, (_, i) => i);
    for (let i = 255; i > 0; i--){
      const j = Math.floor(rand() * (i + 1));
      [src[i], src[j]] = [src[j], src[i]];
    }
    for (let i = 0; i < 512; i++) perm[i] = src[i & 255];

    const fade = t => t*t*t*(t*(t*6 - 15) + 10);
    const lerp = (t, a, b) => a + t * (b - a);
    function grad(hash, x, y, z){
      const h = hash & 15;
      const u = h < 8 ? x : y;
      const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
      return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
    }
    return function(x, y, z){
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
      x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
      const u = fade(x), v = fade(y), w = fade(z);
      const A  = perm[X] + Y,  AA = perm[A] + Z,  AB = perm[A + 1] + Z;
      const B  = perm[X + 1] + Y, BA = perm[B] + Z, BB = perm[B + 1] + Z;
      return lerp(w,
        lerp(v,
          lerp(u, grad(perm[AA], x, y, z),     grad(perm[BA], x - 1, y, z)),
          lerp(u, grad(perm[AB], x, y - 1, z), grad(perm[BB], x - 1, y - 1, z))),
        lerp(v,
          lerp(u, grad(perm[AA + 1], x, y, z - 1),     grad(perm[BA + 1], x - 1, y, z - 1)),
          lerp(u, grad(perm[AB + 1], x, y - 1, z - 1), grad(perm[BB + 1], x - 1, y - 1, z - 1))));
    };
  }

  /* ---------- canvas ---------- */
  const canvas = document.getElementById("field");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0, DPR = 1;

  function sizeCanvas(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  /* ---------- palette ---------- */
  const SOOT = "rgba(11,11,14,";
  const ASH_SHADES = [
    [122,124,132],  // steel
    [148,148,156],  // ash
    [176,175,180],  // pale ash
    [206,204,198],  // paper
  ];
  const VIOLET_CORE = [196,168,255];
  const VIOLET_HALO = [124, 92,214];

  /* ---------- state ---------- */
  let seed, rand, noise, particles, t, raf = null;
  const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const FIELD_SCALE = 0.0016;   // spatial scale of the wind
  const TIME_SCALE  = 0.00016;  // how fast the wind evolves
  const ANGLE_RANGE = Math.PI * 3.2;

  function particleCount(){
    return Math.min(300, Math.max(90, Math.round((W * H) / 8200)));
  }

  function makeParticle(scatter){
    const shade = ASH_SHADES[Math.floor(rand() * ASH_SHADES.length)];
    return {
      x: rand() * W,
      y: scatter ? rand() * H : rand() * H,
      vx: 0, vy: 0,
      speed: 0.35 + rand() * 0.85,
      size: 0.5 + rand() * 0.9,
      shade,
      alpha: 0.16 + rand() * 0.3,
      ember: 0,       // >0 means burning; counts down
      emberMax: 0,
    };
  }

  function igniteParticle(p){
    p.ember = p.emberMax = 140 + Math.floor(rand() * 160);
  }

  function respawn(p){
    p.x = rand() * W;
    p.y = rand() * H;
    p.vx = 0; p.vy = 0;
    p.ember = 0;
  }

  /* ---------- simulation step ---------- */
  function step(){
    // long-exposure fade
    ctx.fillStyle = SOOT + "0.045)";
    ctx.fillRect(0, 0, W, H);

    for (const p of particles){
      const a = noise(p.x * FIELD_SCALE, p.y * FIELD_SCALE, t) * ANGLE_RANGE;
      const lift = p.ember > 0 ? 0.28 : 0;
      p.vx += (Math.cos(a) * p.speed - p.vx) * 0.055;
      p.vy += (Math.sin(a) * p.speed - lift - p.vy) * 0.055;

      const px = p.x, py = p.y;
      p.x += p.vx;
      p.y += p.vy;

      // wrap without streaking across the screen
      let wrapped = false;
      if (p.x < -8){ p.x = W + 8; wrapped = true; }
      if (p.x > W + 8){ p.x = -8; wrapped = true; }
      if (p.y < -8){ p.y = H + 8; wrapped = true; }
      if (p.y > H + 8){ p.y = -8; wrapped = true; }
      if (wrapped) continue;

      if (p.ember > 0){
        const k = p.ember / p.emberMax;            // 1 → 0
        const heat = k * k;
        const r = Math.round(VIOLET_CORE[0] * heat + p.shade[0] * (1 - heat));
        const g = Math.round(VIOLET_CORE[1] * heat + p.shade[1] * (1 - heat));
        const b = Math.round(VIOLET_CORE[2] * heat + p.shade[2] * (1 - heat));
        // halo
        ctx.strokeStyle = `rgba(${VIOLET_HALO[0]},${VIOLET_HALO[1]},${VIOLET_HALO[2]},${0.10 * heat})`;
        ctx.lineWidth = p.size * 5;
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(p.x, p.y); ctx.stroke();
        // core
        ctx.strokeStyle = `rgba(${r},${g},${b},${0.4 + 0.45 * heat})`;
        ctx.lineWidth = p.size * 1.3;
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(p.x, p.y); ctx.stroke();
        p.ember--;
      } else {
        ctx.strokeStyle = `rgba(${p.shade[0]},${p.shade[1]},${p.shade[2]},${p.alpha})`;
        ctx.lineWidth = p.size;
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(p.x, p.y); ctx.stroke();
      }
    }

    // an ember catches on its own, rarely
    if (rand() < 0.012){
      igniteParticle(particles[Math.floor(rand() * particles.length)]);
    }

    t += TIME_SCALE * 16;
  }

  function loop(){
    step();
    raf = requestAnimationFrame(loop);
  }

  /* ---------- survey lifecycle ---------- */
  function seedFromHash(){
    const m = location.hash.match(/seed=(0x[0-9a-fA-F]{1,8})/);
    if (m) return (parseInt(m[1], 16) >>> 0) || 1;
    return null;
  }

  function randomSeed(){
    return (Math.floor(Math.random() * 0xFFFFFFFF) >>> 0) || 1;
  }

  function hex(n, width){
    return "0x" + n.toString(16).toUpperCase().padStart(width, "0");
  }

  function stampPlate(){
    document.getElementById("plateNo").textContent =
      "-" + ((seed >>> 16) & 0xFFFF).toString(16).toUpperCase().padStart(4, "0");
    document.getElementById("seedNo").textContent = hex(seed, 8);
  }

  function survey(newSeed){
    if (raf !== null){ cancelAnimationFrame(raf); raf = null; }
    seed = newSeed;
    rand = mulberry32(seed);
    noise = makeNoise(rand);
    t = rand() * 100;

    sizeCanvas();
    ctx.fillStyle = SOOT + "1)";
    ctx.fillRect(0, 0, W, H);

    particles = Array.from({length: particleCount()}, () => makeParticle(true));

    stampPlate();
    history.replaceState(null, "", "#seed=" + hex(seed, 8));

    if (REDUCED){
      // render one long exposure, then hold still
      for (let i = 0; i < 700; i++) step();
    } else {
      loop();
    }
  }

  /* ---------- interaction ---------- */
  document.getElementById("resurvey").addEventListener("click", () => {
    survey(randomSeed());
  });

  canvas.addEventListener("pointerdown", (e) => {
    // ignite the ash nearest the touch
    const px = e.clientX, py = e.clientY;
    const lit = particles
      .map(p => ({ p, d: (p.x - px) ** 2 + (p.y - py) ** 2 }))
      .sort((a, b) => a.d - b.d)
      .slice(0, 7);
    for (const {p} of lit) igniteParticle(p);
    if (REDUCED){ for (let i = 0; i < 90; i++) step(); }
  });

  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => survey(seed), 180);
  });

  /* ---------- begin ---------- */
  survey(seedFromHash() ?? randomSeed());
})();
</script>
</body>
</html>
